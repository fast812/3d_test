<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D Viewer</title>
  <style>
    html, body { margin:0; height:100%; background:#f2f2f2; }
    body { overflow:hidden; }
    #c { width:100vw; height:100vh; display:block; }
    .hint{
      position:fixed; left:12px; bottom:12px;
      padding:8px 10px; border-radius:10px;
      background:rgba(0,0,0,.55); color:#fff;
      font:13px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      user-select:none; z-index:10;
    }
    .status{
      position:fixed; left:12px; top:12px; right:12px;
      padding:10px; border-radius:10px;
      background:rgba(255,255,255,.92); color:#111;
      font:13px/1.35 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      z-index:10; box-shadow:0 6px 20px rgba(0,0,0,.12);
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="status" id="status">로딩 중…</div>
  <div class="hint">드래그: 회전 · 휠/핀치: 확대 · 우클릭: 이동</div>

  <!-- ✅ 핵심: importmap으로 "three"를 URL로 매핑 -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const statusEl = document.getElementById('status');
    const setStatus = (msg) => statusEl.textContent = msg;

    const canvas = document.querySelector('#c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight, false);
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf2f2f2);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 5000);
    camera.position.set(0, 0.5, 2.5);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;

    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const dir1 = new THREE.DirectionalLight(0xffffff, 1.0);
    dir1.position.set(5, 10, 7);
    scene.add(dir1);
    const dir2 = new THREE.DirectionalLight(0xffffff, 0.6);
    dir2.position.set(-5, 3, -7);
    scene.add(dir2);

    const loader = new GLTFLoader();
    const MODEL_URL = './eunji.glb';

    let model = null;

    setStatus('3D 모델 불러오는 중…');
    loader.load(
      MODEL_URL,
      (gltf) => {
        model = gltf.scene;
        scene.add(model);

        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center);

        const maxDim = Math.max(size.x, size.y, size.z);
        const fov = camera.fov * (Math.PI / 180);
        let dist = (maxDim / 2) / Math.tan(fov / 2);
        dist *= 1.4;

        camera.position.set(0, 0, dist);
        camera.near = dist / 100;
        camera.far = dist * 100;
        camera.updateProjectionMatrix();

        controls.target.set(0, 0, 0);
        controls.update();

        setStatus('로드 완료! (화면 드래그로 회전)');
        setTimeout(() => statusEl.style.display = 'none', 1500);
      },
      (xhr) => {
        if (xhr.total) {
          const pct = Math.round((xhr.loaded / xhr.total) * 100);
          setStatus(`3D 모델 다운로드 중… ${pct}%`);
        }
      },
      (err) => {
        console.error('GLB load error:', err);
        setStatus('❌ GLB 로딩 실패 (F12 콘솔 확인)');
      }
    );

    let autoRotate = true;
    window.addEventListener('pointerdown', () => autoRotate = false, { passive: true });

    function onResize() {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', onResize);

    function render() {
      if (model && autoRotate) model.rotation.y += 0.003;
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(render);
    }
    render();
  </script>
</body>
</html>
